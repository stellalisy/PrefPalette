# PrefPalette Preference Model Training Configuration
# Trains the attribute-mediated preference model with attention-based attribute integration
learning_rate: 1e-5
dataset: data/preference_pairs/askdocs
dataset_probs: "1.0"
train_split: train_2022
eval_split: eval_2022_comment,eval_2022_post
test_split: test_2022_comment,test_2022_post
best_model_eval_split: eval_2022_comment
best_model_eval_metric: acc_mean
prompt_key: context
chosen_key: chosen
rejected_key: rejected
input_key: message
apply_chat_template: true
pretrain: meta-llama/Llama-3.2-1B-Instruct
save_path: outputs/preference_models/all_time
ckpt_path: outputs/preference_models/all_time
max_ckpt_num: 0
logging_steps: 1
save_steps: -1
eval_steps: 10
test_steps: 200
load_checkpoint: true
train_batch_size: 256
micro_train_batch_size: 2
bf16: true
max_epochs: 1
max_len: 2048
zero_stage: 1
flash_attn: true
gradient_checkpointing: true
l2: 0
lr_warmup_ratio: 0.03
packing_samples: true
pref_training: true
feature_classifiers: supportiveness,politeness,sarcasm,humor,formality,verbosity,directness,assertiveness,empathy,Self-Direction,Stimulation,Hedonism,Achievement,Power,Security,Conformity,Tradition,Benevolence,Universalism
feature_dataset: data/attribute_embeddings/askdocs/1B
feature_dropout: 0.1
feature_group: all
include_time: true
max_samples_per_dataset: 100000
context_attention: true
seed: 7
